AWSTemplateFormatVersion: "2010-09-09"
Description: IAM Governance Framework - Role Based Access, Boundaries, STS, CloudTrail, Analyzer

Resources:

  CloudTrailLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: iam-governance-logs-${AWS::AccountId}

  CloudTrailLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailLogBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource:
              Fn::Sub: ${CloudTrailLogBucket.Arn}/*
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  S3PermissionBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: S3PermissionBoundary
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:*
            Resource: "*"

          - Effect: Deny
            Action:
              - iam:*
            Resource: "*"

  S3RestrictedReadRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: S3RestrictedReadRole

      PermissionsBoundary:
        Fn::Sub: arn:aws:iam::${AWS::AccountId}:policy/S3PermissionBoundary

      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                Fn::Sub: arn:aws:iam::${AWS::AccountId}:root
            Action: sts:AssumeRole

      Policies:
        - PolicyName: S3ReadPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - Fn::GetAtt:
                      - CloudTrailLogBucket
                      - Arn
                  - Fn::Sub: ${CloudTrailLogBucket.Arn}/*

  IAMCloudTrail:
    Type: AWS::CloudTrail::Trail
    Properties:
      TrailName: IAMGovernanceTrail
      S3BucketName: !Ref CloudTrailLogBucket

      IsLogging: true
      IncludeGlobalServiceEvents: true
      IsMultiRegionTrail: true
      EnableLogFileValidation: true

  IAMAccessAnalyzer:
    Type: AWS::AccessAnalyzer::Analyzer
    Properties:
      AnalyzerName: IAMGovernanceAnalyzer
      Type: ACCOUNT